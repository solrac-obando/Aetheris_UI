<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether-Web Hybrid</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0b0f19;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        #root {
            position: relative;
            width: 100%; height: 100%;
            overflow: hidden;
        }
        #root > * {
            position: absolute;
            will-change: transform;
            transition: none;
        }
        #status-bar {
            position: fixed; bottom: 10px; left: 10px;
            padding: 6px 14px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 6px;
            color: #94a3b8;
            font-size: 11px;
            z-index: 9999;
            backdrop-filter: blur(8px);
        }
        #status-bar .ok { color: #4ade80; }
        #status-bar .err { color: #f87171; }
        #loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: #0b0f19; z-index: 10000;
            transition: opacity 0.5s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { margin-top: 12px; color: #64748b; font-size: 13px; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Connecting to Aetheris server…</p>
    </div>
    <div id="root"></div>
    <div id="status-bar">
        Status: <span id="status-text" class="err">Disconnected</span>
        &nbsp;|&nbsp; FPS: <span id="fps">0</span>
        &nbsp;|&nbsp; Elements: <span id="el-count">0</span>
    </div>

    <script src="sync.js"></script>
</body>
</html>
