<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris UI - Server-Driven</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
        }
        #aetherCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
            z-index: 10;
        }
        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #666;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #fps {
            position: fixed;
            top: 8px;
            right: 12px;
            color: #4a4;
            font-family: monospace;
            font-size: 12px;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading Aetheris Physics Engine...</div>
    </div>
    <canvas id="aetherCanvas"></canvas>
    <div id="fps">FPS: --</div>

    <!-- Server-Driven UI Intent (injected by Flask/Jinja2) -->
    <script id="aether-intent" type="application/json">
        {{ ui_intent_json | safe }}
    </script>

    <!-- Pyodide CDN -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    
    <!-- Aetheris Bridge -->
    <script src="/wasm/aether_bridge.js"></script>
</body>
</html>
