<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="A high-performance, physics-based UI engine running in the browser via WebAssembly">
    <title>Aetheris UI Engine</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
        }
        #aetherCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #aether-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            overflow: hidden;
            z-index: 20;
        }
        
        /* Loading Screen */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading .logo {
            font-family: monospace;
            font-size: 28px;
            color: #cc4488;
            margin-bottom: 8px;
            letter-spacing: 4px;
        }
        #loading .subtitle {
            font-family: monospace;
            font-size: 12px;
            color: #666;
            margin-bottom: 40px;
        }
        
        /* Algebraic Progress Bar */
        #progress-container {
            width: 300px;
            max-width: 80vw;
            height: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #882266, #cc4488, #ff66aa);
            border-radius: 2px;
            transition: none; /* We control animation via JS Lerp */
            will-change: width;
        }
        #progress-text {
            font-family: monospace;
            font-size: 11px;
            color: #555;
            min-height: 16px;
        }
        
        #fps {
            position: fixed;
            top: 8px;
            right: 12px;
            color: #4a4;
            font-family: monospace;
            font-size: 12px;
            z-index: 5;
        }
        
        /* Install prompt */
        #install-prompt {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px 20px;
            z-index: 50;
            font-family: monospace;
            font-size: 13px;
            color: #ccc;
        }
        #install-prompt button {
            background: #cc4488;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 6px;
            margin-left: 12px;
            cursor: pointer;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <!-- Loading Screen with Algebraic Progress Bar -->
    <div id="loading">
        <div class="logo">AETHERIS</div>
        <div class="subtitle">Physics Engine Loading...</div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="progress-text">Initializing...</div>
    </div>
    
    <canvas id="aetherCanvas"></canvas>
    <div id="aether-overlay"></div>
    <div id="fps">FPS: --</div>
    
    <!-- Install Prompt -->
    <div id="install-prompt">
        Install Aetheris UI
        <button id="install-btn">Install</button>
    </div>

    <!-- Server-Driven UI Intent (injected by Flask/Jinja2) -->
    <script id="aether-intent" type="application/json">
        {{ ui_intent_json | safe }}
    </script>

    <!-- PWA & Service Worker Registration -->
    <script>
        // Register Service Worker for caching
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js', { scope: '/' })
                    .then((reg) => {
                        console.log('[PWA] Service Worker registered:', reg.scope);
                    })
                    .catch((err) => {
                        console.warn('[PWA] Service Worker registration failed:', err);
                    });
            });
        }
        
        // PWA Install Prompt
        let deferredPrompt;
        const installPrompt = document.getElementById('install-prompt');
        const installBtn = document.getElementById('install-btn');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installPrompt.style.display = 'block';
        });
        
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`[PWA] Install ${outcome}`);
                deferredPrompt = null;
                installPrompt.style.display = 'none';
            }
        });
    </script>

    <!-- Pyodide CDN -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    
    <!-- Aetheris Bridge -->
    <script src="/wasm/aether_bridge.js"></script>
</body>
</html>
