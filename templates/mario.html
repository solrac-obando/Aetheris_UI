<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Aetheris Bros — Classic Edition</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; overflow:hidden; background:#5c94fc; color:#fff; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        #gameCanvas { display:block; width:100vw; height:100vh; image-rendering: pixelated; }
        
        /* GUI: Classic Style */
        #hud {
            position: absolute; top: 20px; left: 0; right: 0;
            display: flex; justify-content: space-around;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px #000;
            z-index: 100; pointer-events: none;
        }
        .hud-item span { display: block; text-align: center; }
        
        #loading {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.5s;
        }
        .loading-logo { font-size: 40px; letter-spacing: 10px; margin-bottom: 20px; color: #ff2d55; }
        .progress-container { width: 300px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #ff2d55; transition: width 0.2s; }
        
        #controls-hint {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; background: rgba(0,0,0,0.5); border-radius: 20px;
            font-size: 14px; color: #fff; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-logo">AETHERIS</div>
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <p id="status" style="margin-top:10px; font-size:12px; color:#555;">Loading Classic Assets...</p>
    </div>

    <div id="hud">
        <div class="hud-item">MARIO<span>000000</span></div>
        <div class="hud-item">WORLD<span>1-1</span></div>
        <div class="hud-item">TIME<span>365</span></div>
    </div>
    
    <div id="controls-hint">ARROWS / WASD to Move & Jump</div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status');
        
        let pyodide = null;
        let game = null;
        let keys = {left:false, right:false, up:false};
        
        // Assets
        const assets = {
            mario: new Image(),
            tileset: new Image(),
            bg: new Image()
        };
        assets.mario.src = '/static/mario/mario.png';
        assets.tileset.src = '/static/mario/tileset.png';
        assets.bg.src = '/static/mario/bg.png';

        function setProgress(pct, msg) {
            progressBar.style.width = pct + '%';
            statusText.textContent = msg;
        }

        function makeTransparent(img) {
            const c = document.createElement('canvas');
            c.width = img.width; c.height = img.height;
            const x = c.getContext('2d');
            x.drawImage(img, 0, 0);
            const d = x.getImageData(0,0,c.width,c.height);
            for(let i=0; i<d.data.length; i+=4) {
                const r = d.data[i], g = d.data[i+1], b = d.data[i+2];
                // Target Green (#00FF00) for chroma key
                if(g > 150 && r < 120 && b < 120) d.data[i+3] = 0;
            }
            x.putImageData(d, 0, 0);
            return c;
        }

        async function init() {
            try {
                setProgress(10, "Wait for Images...");
                await Promise.all([
                    new Promise(r => assets.mario.onload = r),
                    new Promise(r => assets.tileset.onload = r),
                    new Promise(r => assets.bg.onload = r)
                ]);
                
                // Process transparency
                assets.mario = makeTransparent(assets.mario);
                assets.tileset = makeTransparent(assets.tileset);

                setProgress(30, "Loading Pyodide...");
                pyodide = await loadPyodide();
                
                setProgress(50, "Loading NumPy...");
                await pyodide.loadPackage('numpy');
                
                setProgress(70, "Mounting Aetheris Core...");
                const coreFiles = [
                    'core/__init__.py', 'core/aether_math.py', 'core/solver_wasm.py', 
                    'core/engine.py', 'core/elements.py', 'core/mario_web.py',
                    'core/json_utils.py', 'core/state_manager.py', 'core/tensor_compiler.py',
                    'core/input_manager.py', 'core/protocols.py', 'core/solver_bridge.py',
                    'core/lifecycle/__init__.py', 'core/lifecycle/base.py', 
                    'core/lifecycle/manager.py', 'core/lifecycle/profiler.py'
                ];
                
                pyodide.FS.mkdir('/core');
                pyodide.FS.mkdir('/core/lifecycle');
                for(const f of coreFiles) {
                    const res = await fetch('/' + f);
                    pyodide.FS.writeFile('/' + f, await res.text());
                }
                
                setProgress(90, "Starting Engine...");
                await pyodide.runPythonAsync(`
import sys
sys.path.insert(0, '/')
from core.mario_web import MarioWebEngine
game = MarioWebEngine()
                `);
                
                game = pyodide.globals.get('game');
                
                setProgress(100, "Done!");
                setTimeout(() => {
                    document.getElementById('loading').style.opacity = 0;
                    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
                }, 500);
                
                requestAnimationFrame(loop);
            } catch (e) {
                statusText.innerHTML = `<span style="color:red">Error: ${e.message}</span>`;
                console.error(e);
            }
        }

        // Input Handling
        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if(e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            if(e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') keys.up = true;
        });
        window.addEventListener('keyup', e => {
            if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if(e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
            if(e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') keys.up = false;
        });

        function loop() {
            // Update
            game.handle_input(JSON.stringify(keys));
            const state = JSON.parse(game.get_render_state());
            const mario = state.mario;
            const cameraX = state.camera;
            
            // Draw
            const w = canvas.width = window.innerWidth;
            const h = canvas.height = window.innerHeight;
            
            // Background (Parallax 10%)
            ctx.drawImage(assets.bg, -cameraX * 0.1, 0, w * 1.5, h);
            
            ctx.save();
            ctx.translate(-cameraX, 0);
            
            // Draw Tiles
            state.tiles.forEach(t => {
                const [tx, ty, tt] = t;
                if (tx + 64 < cameraX || tx > cameraX + w) return;
                
                let sx = 0, sy = 0;
                const gs = 256; // Grid Size in the 1024x1024 image
                
                if (tt === 0 || tt === 1) { sx = 0; sy = 0; }     // Brick
                else if (tt === 3) { sx = 768; sy = 0; }         // Pipe
                else if (tt === 2) { sx = 0; sy = 512; }         // Question (Big one for better look)
                
                ctx.drawImage(assets.tileset, sx, sy, gs, gs, tx, ty, 64, 64);
            });
            
            // Draw Mario
            ctx.save();
            ctx.translate(mario.x + 32, mario.y + 32);
            if(mario.facing === 'left') ctx.scale(-1, 1);
            
            // Animation logic based on state
            // For now, just show the sprite
            ctx.drawImage(assets.mario, -32, -32, 64, 64);
            ctx.restore();
            
            ctx.restore();
            
            requestAnimationFrame(loop);
        }

        init();
    </script>
</body>
</html>
