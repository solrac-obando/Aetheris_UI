<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Odyssey - Media Universe Explorer</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #e0e0e0;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0a0a0f;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        
        .loading-title {
            font-size: 3rem; font-weight: 300;
            letter-spacing: 0.5em;
            background: linear-gradient(90deg, #ff2d55, #ff6b35, #ffd700, #34c759, #5ac8fa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }
        .loading-subtitle {
            font-size: 0.9rem; color: #666;
            letter-spacing: 0.3em; text-transform: uppercase;
            margin-bottom: 3rem;
        }
        .loading-bar-container {
            width: 300px; height: 2px;
            background: #1a1a2e; border-radius: 1px;
            overflow: hidden; margin-bottom: 1rem;
        }
        .loading-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #ff2d55, #5ac8fa);
            transition: width 0.3s ease;
        }
        .loading-status {
            font-size: 0.75rem; color: #444;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        /* Main Canvas */
        #odyssey-canvas {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            cursor: grab;
        }
        #odyssey-canvas:active { cursor: grabbing; }

        /* DOM Overlay */
        #dom-overlay {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }
        .media-label {
            position: absolute;
            pointer-events: auto;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            user-select: text;
            transition: opacity 0.2s;
        }
        .media-label:hover { opacity: 1; font-size: 11px; }

        /* HUD */
        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px;
            background: linear-gradient(180deg, rgba(10,10,15,0.9) 0%, transparent 100%);
            z-index: 100; pointer-events: none;
        }
        #hud > * { pointer-events: auto; }
        
        .hud-title {
            font-size: 1.2rem; font-weight: 300;
            letter-spacing: 0.3em;
            color: #fff;
        }
        .hud-stats {
            display: flex; gap: 24px;
            font-size: 0.75rem; color: #888;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .hud-stat-value { color: #5ac8fa; }

        /* Genre Controls */
        #genre-controls {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 8px;
            padding: 8px 16px;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .genre-btn {
            padding: 6px 14px;
            border: none; border-radius: 16px;
            background: rgba(255,255,255,0.05);
            color: #888; font-size: 0.75rem;
            cursor: pointer; transition: all 0.2s;
            font-family: inherit;
        }
        .genre-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .genre-btn.active {
            background: linear-gradient(135deg, #ff2d55, #ff6b35);
            color: #fff; font-weight: 500;
        }

        /* Supernova Button */
        #supernova-btn {
            position: fixed; bottom: 24px; right: 24px;
            padding: 10px 20px;
            border: 1px solid rgba(255,45,85,0.3);
            border-radius: 20px;
            background: rgba(255,45,85,0.1);
            color: #ff2d55; font-size: 0.8rem;
            cursor: pointer; transition: all 0.3s;
            font-family: inherit; letter-spacing: 0.1em;
            z-index: 100;
        }
        #supernova-btn:hover {
            background: rgba(255,45,85,0.2);
            border-color: rgba(255,45,85,0.6);
            box-shadow: 0 0 20px rgba(255,45,85,0.3);
        }

        /* Tooltip */
        #tooltip {
            position: fixed;
            padding: 12px 16px;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 0.8rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 200;
            max-width: 250px;
        }
        #tooltip.visible { opacity: 1; }
        .tooltip-title { font-weight: 600; color: #fff; margin-bottom: 4px; }
        .tooltip-meta { color: #888; font-size: 0.7rem; line-height: 1.5; }
        .tooltip-rating { color: #ffd700; }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-title">AETHERIS</div>
        <div class="loading-subtitle">Odyssey Media Universe</div>
        <div class="loading-bar-container">
            <div class="loading-bar" id="loading-bar"></div>
        </div>
        <div class="loading-status" id="loading-status">Initializing...</div>
    </div>

    <!-- Main Canvas -->
    <canvas id="odyssey-canvas"></canvas>

    <!-- DOM Overlay for text labels -->
    <div id="dom-overlay"></div>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-title">AETHERIS ODYSSEY</div>
        <div class="hud-stats">
            <div>Elements: <span class="hud-stat-value" id="stat-elements">0</span></div>
            <div>FPS: <span class="hud-stat-value" id="stat-fps">0</span></div>
            <div>Displacement: <span class="hud-stat-value" id="stat-disp">0px</span></div>
        </div>
    </div>

    <!-- Genre Controls -->
    <div id="genre-controls">
        <button class="genre-btn active" data-genre="none">All</button>
        <button class="genre-btn" data-genre="action">Action</button>
        <button class="genre-btn" data-genre="scifi">Sci-Fi</button>
        <button class="genre-btn" data-genre="drama">Drama</button>
        <button class="genre-btn" data-genre="comedy">Comedy</button>
        <button class="genre-btn" data-genre="thriller">Thriller</button>
        <button class="genre-btn" data-genre="fantasy">Fantasy</button>
    </div>

    <!-- Supernova Button -->
    <button id="supernova-btn">⚡ SUPERNOVA</button>

    <!-- Tooltip -->
    <div id="tooltip">
        <div class="tooltip-title"></div>
        <div class="tooltip-meta"></div>
    </div>

    <!-- Pyodide CDN -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

    <script>
        // ====================================================================
        // Aetheris Odyssey - Web Frontend
        // ====================================================================
        
        const canvas = document.getElementById('odyssey-canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('dom-overlay');
        const loadingScreen = document.getElementById('loading-screen');
        const loadingBar = document.getElementById('loading-bar');
        const loadingStatus = document.getElementById('loading-status');
        const tooltip = document.getElementById('tooltip');
        
        let pyodide = null;
        let engine = null;
        let mediaElements = [];
        let domLabels = {};
        let focusedGenre = 'none';
        let isPointerDown = false;
        let draggedIndex = -1;
        let lastPointerX = 0, lastPointerY = 0;
        let frameCount = 0;
        let lastFpsTime = performance.now();
        let fps = 0;
        let supernovaTriggered = false;

        // Progress helper
        function setProgress(pct, status) {
            loadingBar.style.width = `${pct}%`;
            loadingStatus.textContent = status;
        }

        // Resize canvas
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
        }

        // Rating to color (matches Python implementation)
        function ratingToColor(rating) {
            const t = Math.max(0, Math.min(1, rating / 10));
            let r, g, b;
            if (t < 0.3) {
                const s = t / 0.3; r = 1; g = 0.1 + s * 0.5; b = 0.1;
            } else if (t < 0.5) {
                const s = (t - 0.3) / 0.2; r = 1; g = 0.6 + s * 0.4; b = 0.1;
            } else if (t < 0.7) {
                const s = (t - 0.5) / 0.2; r = 1 - s * 0.5; g = 1; b = 0.1 + s * 0.3;
            } else {
                const s = (t - 0.7) / 0.3; r = 0.5 - s * 0.3; g = 1; b = 0.4 + s * 0.4;
            }
            return [r, g, b, 0.85];
        }

        // Fetch Odyssey data
        async function fetchOdysseyData() {
            setProgress(10, 'Fetching media database...');
            const response = await fetch('/api/odyssey/elements');
            const data = await response.json();
            setProgress(30, `Loaded ${data.elements.length} media entries`);
            return data.elements;
        }

        // Initialize Pyodide and engine
        async function initEngine(elements) {
            setProgress(40, 'Loading Pyodide runtime...');
            pyodide = await loadPyodide({
                indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/'
            });
            setProgress(60, 'Loading NumPy...');
            await pyodide.loadPackage('numpy');

            setProgress(70, 'Mounting core modules...');
            const coreFiles = [
                'core/__init__.py', 'core/aether_math.py',
                'core/solver.py', 'core/solver_wasm.py', 'core/solver_bridge.py',
                'core/state_manager.py', 'core/tensor_compiler.py',
                'core/elements.py', 'core/engine.py',
                'core/renderer_base.py', 'core/input_manager.py',
                'core/data_bridge.py', 'core/ui_builder.py',
            ];
            
            pyodide.FS.mkdir('/core');
            for (const file of coreFiles) {
                try {
                    const res = await fetch(`/${file}`);
                    if (res.ok) {
                        pyodide.FS.writeFile(`/${file}`, await res.text());
                    }
                } catch (e) {
                    console.warn(`Failed to load ${file}: ${e.message}`);
                }
            }

            setProgress(80, 'Initializing physics engine...');
            
            // Build elements in Python
            await pyodide.runPythonAsync(`
import sys
sys.path.insert(0, '/')

import json
import numpy as np
from core.engine import AetherEngine
from core.elements import StaticBox
from core.data_bridge import min_max_scale

engine = AetherEngine()

elements_data = json.loads('''${JSON.stringify(elements).replace(/'/g, "\\'")}''')

win_w = 1200
win_h = 900

# Calculate ranges
all_votes = [e['votes'] for e in elements_data]
min_votes, max_votes = min(all_votes), max(all_votes)
all_years = [e['year'] for e in elements_data]
min_year, max_year = min(all_years), max(all_years)

cols = 10
for i, e in enumerate(elements_data):
    rating = float(e['rating'])
    year = float(e['year'])
    votes = float(e['votes'])
    
    # Min-Max scaling
    year_t = (year - min_year) / max(1.0, max_year - min_year)
    size = 20.0 + (votes - min_votes) / max(1.0, max_votes - min_votes) * 100.0
    y_pos = win_h * 0.1 + year_t * (win_h * 0.7)
    
    col = i % cols
    x_pos = 80 + col * (win_w - 160) / cols
    
    # Color from rating
    t = max(0.0, min(1.0, rating / 10.0))
    if t < 0.3:
        s = t / 0.3; cr, cg, cb = 1.0, 0.1 + s * 0.5, 0.1
    elif t < 0.5:
        s = (t - 0.3) / 0.2; cr, cg, cb = 1.0, 0.6 + s * 0.4, 0.1
    elif t < 0.7:
        s = (t - 0.5) / 0.2; cr, cg, cb = 1.0 - s * 0.5, 1.0, 0.1 + s * 0.3
    else:
        s = (t - 0.7) / 0.3; cr, cg, cb = 0.5 - s * 0.3, 1.0, 0.4 + s * 0.4
    
    elem = StaticBox(
        x=float(x_pos), y=float(y_pos),
        w=float(size), h=float(size),
        color=(float(cr), float(cg), float(cb), 0.85),
        z=int(rating * 10)
    )
    elem._id = str(e['id'])
    elem._odyssey_metadata = {
        'title': e['title'], 'type': e['type'], 'genre': e['genre'],
        'rating': rating, 'year': int(e['year']), 'votes': int(e['votes']),
        'genre_vector': json.loads(e['genre_vector'])
    }
    elem._original_x = float(x_pos)
    elem._original_y = float(y_pos)
    engine.register_element(elem)

print(f"Odyssey Engine: {engine.element_count} elements")
            `);

            engine = pyodide.globals.get('engine');
            setProgress(90, 'Engine ready');
            return engine;
        }

        // Apply genre orbit
        function applyGenreOrbit(genre) {
            if (!engine || genre === 'none') return;
            
            const genreVectors = {
                'action': 0, 'scifi': 1, 'drama': 2, 'comedy': 3,
                'thriller': 0, 'horror': 0, 'romance': 2, 'animation': 3,
                'fantasy': 1, 'documentary': 2,
            };
            const genreIdx = genreVectors[genre] || 0;
            const stiffness = 0.05;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            engine._apply_genre_orbit(genreIdx, stiffness, centerX, centerY);
        }

        // Trigger supernova
        function triggerSupernova() {
            if (!engine) return;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            engine._trigger_supernova(centerX, centerY);
            console.log('⚡ SUPERNOVA TRIGGERED');
        }

        // Render frame
        function renderFrame() {
            if (!engine) { requestAnimationFrame(renderFrame); return; }
            
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            // Apply genre orbit
            if (focusedGenre !== 'none') {
                applyGenreOrbit(focusedGenre);
            }
            
            // Tick engine
            const dataProxy = engine.tick(w, h);
            const rectProxy = dataProxy.get('rect');
            const colorProxy = dataProxy.get('color');
            const zProxy = dataProxy.get('z');
            
            const rectBuffer = rectProxy.getBuffer();
            const colorBuffer = colorProxy.getBuffer();
            const zBuffer = zProxy.getBuffer();
            
            const rects = rectBuffer.data;
            const colors = colorBuffer.data;
            const zIndices = zBuffer.data;
            const n = dataProxy.length;
            
            // Clear canvas
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, w, h);
            
            // Draw elements
            for (let i = 0; i < n; i++) {
                const idx = i * 4;
                const x = rects[idx];
                const y = rects[idx + 1];
                const size = rects[idx + 2];
                const h2 = rects[idx + 3];
                
                const r = Math.round(colors[idx] * 255);
                const g = Math.round(colors[idx + 1] * 255);
                const b = Math.round(colors[idx + 2] * 255);
                const a = colors[idx + 3];
                
                // Draw rounded rectangle
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${a})`;
                const radius = Math.min(8, size / 4);
                ctx.beginPath();
                ctx.roundRect(x, y, size, h2, radius);
                ctx.fill();
                
                // Glow effect for high-z elements
                if (zIndices[i] > 80) {
                    ctx.shadowColor = `rgba(${r}, ${g}, ${b}, 0.3)`;
                    ctx.shadowBlur = 10;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
            
            // Update DOM labels
            updateDomLabels(dataProxy, rects, colors, zIndices);
            
            // Update HUD
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsTime = now;
                document.getElementById('stat-fps').textContent = fps;
                document.getElementById('stat-elements').textContent = n;
            }
            
            // Calculate average displacement
            let totalDisp = 0;
            for (let i = 0; i < n; i++) {
                const origX = 80 + (i % 10) * (1200 - 160) / 10;
                const origY = 90 + Math.floor(i / 10) * 80;
                const dx = rects[i * 4] - origX;
                const dy = rects[i * 4 + 1] - origY;
                totalDisp += Math.sqrt(dx * dx + dy * dy);
            }
            document.getElementById('stat-disp').textContent = `${(totalDisp / n).toFixed(1)}px`;
            
            // Cleanup PyProxy
            rectBuffer.release();
            colorBuffer.release();
            zBuffer.release();
            rectProxy.destroy();
            colorProxy.destroy();
            zProxy.destroy();
            dataProxy.destroy();
            
            requestAnimationFrame(renderFrame);
        }

        // Update DOM labels
        function updateDomLabels(dataProxy, rects, colors, zIndices) {
            // Get metadata
            const metadataProxy = engine.get_ui_metadata();
            const metadata = JSON.parse(metadataProxy);
            metadataProxy.destroy();
            
            const n = dataProxy.length;
            const activeThisFrame = new Set();
            
            for (let i = 0; i < n; i++) {
                const z = zIndices[i];
                const zKey = String(z);
                
                // Check if this element has metadata
                const meta = metadata[zKey];
                if (!meta || meta.type !== 'canvas_text') continue;
                
                const x = rects[i * 4];
                const y = rects[i * 4 + 1];
                const w = rects[i * 4 + 2];
                const h = rects[i * 4 + 3];
                
                const labelId = `label-${zKey}`;
                activeThisFrame.add(labelId);
                
                let label = domLabels[labelId];
                if (!label) {
                    label = document.createElement('div');
                    label.className = 'media-label';
                    label.id = labelId;
                    overlay.appendChild(label);
                    domLabels[labelId] = label;
                }
                
                label.textContent = meta.text || '';
                label.style.left = `${x}px`;
                label.style.top = `${y + h / 2 - 6}px`;
                label.style.width = `${w}px`;
            }
            
            // Remove inactive labels
            for (const id in domLabels) {
                if (!activeThisFrame.has(id)) {
                    domLabels[id].remove();
                    delete domLabels[id];
                }
            }
        }

        // Setup input bridge
        function setupInputBridge() {
            canvas.addEventListener('pointerdown', (e) => {
                if (!engine) return;
                isPointerDown = true;
                lastPointerX = e.clientX;
                lastPointerY = e.clientY;
                
                // Hit test
                const dataProxy = engine.tick(window.innerWidth, window.innerHeight);
                const rects = dataProxy.get('rect').getBuffer().data;
                const n = dataProxy.length;
                
                let hitIdx = -1;
                for (let i = n - 1; i >= 0; i--) {
                    const idx = i * 4;
                    const ex = rects[idx], ey = rects[idx + 1];
                    const ew = rects[idx + 2], eh = rects[idx + 3];
                    if (e.clientX >= ex && e.clientX <= ex + ew &&
                        e.clientY >= ey && e.clientY <= ey + eh) {
                        hitIdx = i;
                        break;
                    }
                }
                
                dataProxy.destroy();
                
                if (hitIdx >= 0) {
                    draggedIndex = hitIdx;
                    engine.handle_pointer_down(hitIdx, e.clientX, e.clientY);
                    canvas.setPointerCapture(e.pointerId);
                }
            });
            
            canvas.addEventListener('pointermove', (e) => {
                if (!engine || !isPointerDown) return;
                lastPointerX = e.clientX;
                lastPointerY = e.clientY;
                engine.handle_pointer_move(e.clientX, e.clientY);
            });
            
            canvas.addEventListener('pointerup', (e) => {
                if (!engine || !isPointerDown) return;
                isPointerDown = false;
                draggedIndex = -1;
                engine.handle_pointer_up();
                canvas.releasePointerCapture(e.pointerId);
            });
            
            canvas.addEventListener('pointercancel', () => {
                if (!engine || !isPointerDown) return;
                isPointerDown = false;
                draggedIndex = -1;
                engine.handle_pointer_up();
            });
        }

        // Setup genre controls
        function setupGenreControls() {
            document.querySelectorAll('.genre-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    focusedGenre = btn.dataset.genre;
                });
            });
        }

        // Setup supernova button
        function setupSupernova() {
            document.getElementById('supernova-btn').addEventListener('click', () => {
                triggerSupernova();
            });
            
            // Keyboard shortcut: Space bar triggers supernova
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    triggerSupernova();
                }
            });
        }

        // Setup tooltip
        function setupTooltip() {
            canvas.addEventListener('mousemove', (e) => {
                if (isPointerDown) {
                    tooltip.classList.remove('visible');
                    return;
                }
                
                // Simple hover detection would need current frame data
                // For now, show tooltip on hover over DOM labels
            });
        }

        // Main initialization
        async function main() {
            try {
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                
                const elements = await fetchOdysseyData();
                await initEngine(elements);
                
                setProgress(95, 'Setting up interaction...');
                setupInputBridge();
                setupGenreControls();
                setupSupernova();
                setupTooltip();
                
                setProgress(100, 'Launching Odyssey...');
                await new Promise(r => setTimeout(r, 500));
                
                loadingScreen.classList.add('hidden');
                setTimeout(() => { loadingScreen.style.display = 'none'; }, 800);
                
                requestAnimationFrame(renderFrame);
                
            } catch (e) {
                loadingStatus.innerHTML = `<span style="color:#ff2d55">Error: ${e.message}</span>`;
                console.error('Odyssey initialization failed:', e);
            }
        }

        // Start
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', main);
        } else {
            main();
        }
    </script>
</body>
</html>
